<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pet Pals</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #c40000, #ff6b6b);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.4)),
        url('https://plus.unsplash.com/premium_photo-1700838996339-de3bd9663344')
        center/cover no-repeat;
    }

    header h1 {
      font-size: 3rem;
    }

    .shop-section {
      background: white;
      color: #b30000;
      padding: 50px 20px;
      border-radius: 30px 30px 0 0;
    }

    /* Chatbot */
    .chatbot-container {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 380px;
      height: 600px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      display: none;
      background: white;
      z-index: 9999;
    }

    .chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 15px 22px;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 10000;
    }

    .santa-message {
      position: fixed;
      bottom: 150px;
      right: 20px;
      background: white;
      color: #b30000;
      padding: 12px 18px;
      border-radius: 16px;
      display: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <header>
    <h1>Pet Pals</h1>
    <p>Your festive shopping companion</p>
  </header>

  <div class="shop-section">
    <h2>Shop Now</h2>
    <p>Explore our festive collection</p>
  </div>

  <!-- Chat button -->
  <button class="chat-toggle" id="chatToggle">
    Ask Pet Pal’s Helper
  </button>

  <!-- Santa message -->
  <div class="santa-message" id="santaMessage">
    Need help? Ask me anything!
  </div>

  <!-- Chatbot -->
  <div class="chatbot-container" id="chatbot">
    <iframe
      src="https://ai-chatbot-maik.onrender.com?site=christmas"
      width="100%"
      height="100%"
      style="border:none;">
    </iframe>
  </div>

  <!-- Script (MUST be after elements) -->
  <script>
    const toggleBtn = document.getElementById("chatToggle");
    const chatbot = document.getElementById("chatbot");
    const santaMessage = document.getElementById("santaMessage");

    toggleBtn.addEventListener("click", () => {
      const isOpen = chatbot.style.display === "block";

      chatbot.style.display = isOpen ? "none" : "block";
      santaMessage.style.display = isOpen ? "none" : "block";

      toggleBtn.textContent = isOpen
        ? "Ask Pet Pal’s Helper"
        : "Close Chat";
    });
  </script>

</body>
</html>
